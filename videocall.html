<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Interview Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        body {
            display: flex;
            flex-direction: column; 
            min-height: 100vh;
            margin: 0;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f4ece4, #f1eadd, #f8f4e8, #faf2e9, #f5eedf);
            background-attachment: fixed;
            transition: background 0.8s ease, color 0.3s ease;
            color: #ffffff; 
            padding: 20px;
        }

        body.dark {
            background: linear-gradient(135deg, #1f121f, #1c1620, #161221, #1a111d, #180e0f);
            color: #ffffff; 
        }

        #header {
            padding: 20px;
            text-align: center;
            color: #212529; /* Dark text for light mode */
            transition: color 0.3s ease;
        }

        body.dark #header {
            color: #ffffff; /* Light text for dark mode */
        }

        #video-container {
            width: 100vw;
            height: 85vh;
        }

        .floating-btn {
            position: fixed;
            top: 20px;
            z-index: 1000;
            background: transparent;
            border: none;
            box-shadow: none;
            color: #212529;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease, color 0.3s ease;
            padding: 10px;
        }

        .floating-btn .material-symbols-outlined {
            font-size: 32px; 
        }

        .floating-btn:hover {
            transform: scale(1.15);
        }

        .back-btn { left: 20px; }
        .toggle-btn { right: 20px; }

        body.dark .floating-btn { color: #ffffff; }

        /* --- NEW SUBTITLE STYLES --- */
        #subtitles-container {
            display: none; /* Hidden until someone speaks */
            position: fixed;
            bottom: 60px; /* Floats near the bottom, above Zego controls */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 500;
            max-width: 80%;
            text-align: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            pointer-events: none; /* Lets you click the video behind the text */
        }
    </style>
</head>
<body class="dark"> 
    <button class="floating-btn back-btn" onclick="goBack()" title="Leave Meeting">
        <span class="material-symbols-outlined">logout</span>
    </button>

    <button class="floating-btn toggle-btn" onclick="toggleDarkMode()" title="Toggle Theme">
        <span class="material-symbols-outlined" id="theme-icon">wb_sunny</span>
    </button>

    <div id="header">
        <h2>Live Interview Room</h2>
    </div>

    <div id="video-container"></div>

    <div id="subtitles-container">
        <div id="subtitles-text">Waiting for speaker...</div>
    </div>

    <script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>

    <script>
        window.onload = function () {
            // 1. Get real user details from localStorage
            const storedUserId = localStorage.getItem("userId");
            const storedUserName = localStorage.getItem("userName");

            const userID = storedUserId ? storedUserId : (Math.floor(Math.random() * 10000) + "");
            const userName = storedUserName ? storedUserName : "Guest_" + userID;

            // 2. Extract Room ID from URL
            function getUrlParams(url) {
                let urlStr = url.split('?')[1] || '';
                return Object.fromEntries(new URLSearchParams(urlStr).entries());
            }
            
            const urlParams = getUrlParams(window.location.href);
            const roomID = urlParams['roomID'] || (Math.floor(Math.random() * 10000) + "");
            const isParticipantLink = !!urlParams['roomID']; 

            // 3. ZegoCloud Credentials
            const appID = 767996820; 
            const serverSecret = "051753ef4d52dca77aa2f9bf2e0fec5c";

            // 4. Generate Token
            const kitToken = ZegoUIKitPrebuilt.generateKitTokenForTest(
                appID, serverSecret, roomID, userID, userName
            );

            // 5. Initialize Call
            const zp = ZegoUIKitPrebuilt.create(kitToken);
            
            zp.joinRoom({
                container: document.querySelector("#video-container"),
                sharedLinks: [{
                    name: 'Meeting Link',
                    url: window.location.protocol + '//' + window.location.host + window.location.pathname + '?roomID=' + roomID,
                }],
                scenario: {
                    mode: ZegoUIKitPrebuilt.VideoConference, 
                },
                turnOnMicrophoneWhenJoining: false, 
                turnOnCameraWhenJoining: false,     
                showMyCameraToggleButton: true,
                showMyMicrophoneToggleButton: true,
                showAudioVideoSettingsButton: true,
                showScreenSharingButton: true,
                showTextChat: true,
                showUserList: true,
                maxUsers: 2, 
                layout: "Auto",
            });

            // 6. Start Transcription logic
            if (isParticipantLink) {
                startSpeechToText(userID, userName, roomID);
            } else {
                receiveSpeechToText(roomID); 
            }
        };

        // --- Transcription & WebSocket Logic ---

        function startSpeechToText(userID, userName, roomID) {
            const wsUrl = 'wss://luteotropic-gale-cynical.ngrok-free.dev';        
            const socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                console.log("Connected to WebSocket for transcription.");
                socket.send(JSON.stringify({ type: 'join', roomID: roomID, role: 'sender' }));
            };

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                console.warn("Speech Recognition API is not supported in this browser.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;   
            recognition.interimResults = true; 
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                const currentText = finalTranscript || interimTranscript;

                if (socket.readyState === WebSocket.OPEN && currentText.trim() !== '') {
                    socket.send(JSON.stringify({
                        type: 'transcription',
                        roomID: roomID,
                        userId: userID,
                        userName: userName,
                        text: currentText,
                        isFinal: !!finalTranscript
                    }));
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error:", event.error);
            };

            recognition.onend = () => {
                console.log("Transcription paused, restarting...");
                try { recognition.start(); } catch(e) {}
            };

            recognition.start();
        }

        function receiveSpeechToText(roomID) {
            const wsUrl = 'wss://luteotropic-gale-cynical.ngrok-free.dev'; 
            const socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                console.log("Connected to WebSocket to receive transcription.");
                socket.send(JSON.stringify({ type: 'join', roomID: roomID, role: 'receiver' }));
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // NEW VISUAL UPDATE LOGIC
                if (data.type === 'transcription') {
                    const subtitlesContainer = document.getElementById('subtitles-container');
                    const subtitlesText = document.getElementById('subtitles-text');
                    
                    subtitlesContainer.style.display = 'block'; // Unhide the box
                    subtitlesText.innerHTML = `<strong>${data.userName}:</strong> ${data.text}`; // Inject text
                }
            };
        }

        // Theme Toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const themeIcon = document.getElementById('theme-icon');
            themeIcon.textContent = document.body.classList.contains('dark') ? 'wb_sunny' : 'dark_mode'; 
        }

        // Leave meeting
        function goBack() {
            window.location.href = 'in-meet.html';
        }
    </script>
</body>
</html>
