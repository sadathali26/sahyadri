<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome AI Transcriber</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f4f7f6; }
        #container { width: 80%; max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #status { font-weight: bold; margin-bottom: 10px; color: #555; }
        #transcript { min-height: 150px; border: 1px solid #ddd; padding: 15px; border-radius: 8px; line-height: 1.6; font-size: 1.1rem; color: #333; margin-bottom: 20px; white-space: pre-wrap; }
        .interim { color: #999; font-style: italic; }
        button { padding: 12px 24px; font-size: 1rem; cursor: pointer; border: none; border-radius: 6px; background: #007bff; color: white; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button.recording { background: #dc3545; }
    </style>
</head>
<body>

<div id="container">
    <h2>Chrome Real-Time Transcribe</h2>
    <div id="status">Status: Ready</div>
    <div id="transcript" id="output">Your speech will appear here...</div>
    <button id="toggleBtn">Start Transcribing</button>
</div>

<script>
   const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
    alert("Web Speech API not supported in this browser.");
} else {
    const recognition = new SpeechRecognition();
    const toggleBtn = document.getElementById('toggleBtn');
    const transcriptDiv = document.getElementById('transcript');
    const statusDiv = document.getElementById('status');

    recognition.continuous = true;
    recognition.interimResults = true;
    
    // FIX: Dynamically grab the exact language code your browser uses
    recognition.lang = navigator.language || 'en-US'; 

    let isRecording = false;

    recognition.onresult = (event) => {
        let final = '';
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                final += event.results[i][0].transcript + ' ';
            } else {
                interim += event.results[i][0].transcript;
            }
        }
        transcriptDiv.innerHTML = `<span>${final}</span><span class="interim">${interim}</span>`;
    };

    recognition.onstart = () => {
        statusDiv.innerText = `Status: Listening... (${recognition.lang})`;
        toggleBtn.innerText = "Stop Transcribing";
        toggleBtn.classList.add('recording');
        isRecording = true;
    };

    recognition.onerror = (event) => {
        statusDiv.innerText = `Error: ${event.error}`;
    };

    recognition.onend = () => {
        statusDiv.innerText = "Status: Stopped";
        toggleBtn.innerText = "Start Transcribing";
        toggleBtn.classList.remove('recording');
        isRecording = false;
    };

    toggleBtn.addEventListener('click', () => {
        isRecording ? recognition.stop() : recognition.start();
    });
}
</script>

</body>
</html>
