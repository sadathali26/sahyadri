<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome AI Transcriber</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f4f7f6; }
        #container { width: 80%; max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #status { font-weight: bold; margin-bottom: 10px; color: #555; }
        #transcript { min-height: 150px; border: 1px solid #ddd; padding: 15px; border-radius: 8px; line-height: 1.6; font-size: 1.1rem; color: #333; margin-bottom: 20px; white-space: pre-wrap; }
        .interim { color: #999; font-style: italic; }
        button { padding: 12px 24px; font-size: 1rem; cursor: pointer; border: none; border-radius: 6px; background: #007bff; color: white; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button.recording { background: #dc3545; }
    </style>
</head>
<body>

<div id="container">
    <h2>Chrome Real-Time Transcribe</h2>
    <div id="status">Status: Ready</div>
    <div id="transcript" id="output">Your speech will appear here...</div>
    <button id="toggleBtn">Start Transcribing</button>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
    alert("Your browser does not support the Web Speech API. Please use Chrome.");
} else {
    const recognition = new SpeechRecognition();
    const toggleBtn = document.getElementById('toggleBtn');
    const transcriptDiv = document.getElementById('transcript');
    const statusDiv = document.getElementById('status');

    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US'; 

    // --- FIX: On-Device Check ---
    async function startRecognition() {
        // In 2026, we check if the language pack exists before forcing local processing
        if ('available' in SpeechRecognition) {
            const status = await SpeechRecognition.available({
                langs: [recognition.lang],
                processLocally: true
            });

            if (status === 'available') {
                recognition.processLocally = true;
                console.log("Using High-Speed On-Device Engine");
            } else {
                recognition.processLocally = false; // Fallback to Cloud
                console.warn("Language pack not found. Falling back to Cloud Recognition.");
            }
        }
        
        try {
            recognition.start();
        } catch (e) {
            statusDiv.innerText = "Error: Already started or blocked.";
        }
    }

    let isRecording = false;
    let finalTranscript = '';

    recognition.onresult = (event) => {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript + ' ';
            } else {
                interimTranscript += event.results[i][0].transcript;
            }
        }
        transcriptDiv.innerHTML = `<span>${finalTranscript}</span><span class="interim">${interimTranscript}</span>`;
    };

    recognition.onstart = () => {
        statusDiv.innerText = "Status: Listening...";
        toggleBtn.innerText = "Stop Transcribing";
        toggleBtn.classList.add('recording');
        isRecording = true;
    };

    recognition.onerror = (event) => {
        // If it still fails, tell the user why
        if (event.error === 'language-not-supported') {
            statusDiv.innerText = "Error: Language not supported. Try 'en-US'.";
        } else {
            statusDiv.innerText = `Error: ${event.error}`;
        }
        stopRecording();
    };

    recognition.onend = () => { stopRecording(); };

    function stopRecording() {
        statusDiv.innerText = "Status: Stopped";
        toggleBtn.innerText = "Start Transcribing";
        toggleBtn.classList.remove('recording');
        isRecording = false;
    }

    toggleBtn.addEventListener('click', () => {
        if (isRecording) {
            recognition.stop();
        } else {
            finalTranscript = '';
            startRecognition();
        }
    });
}
</script>

</body>
</html>
